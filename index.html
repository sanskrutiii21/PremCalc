<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
      overflow:hidden;
    }

    /* Animated Background */
    body::before{
      content:"";
      position:absolute;
      width:500px;
      height:500px;
      background:linear-gradient(#00f5ff,#8b5cf6);
      border-radius:50%;
      filter:blur(120px);
      top:-100px;
      left:-100px;
      animation: move 8s infinite alternate;
    }

    body::after{
      content:"";
      position:absolute;
      width:400px;
      height:400px;
      background:linear-gradient(#ff00c8,#ff6b00);
      border-radius:50%;
      filter:blur(120px);
      bottom:-100px;
      right:-100px;
      animation: move2 10s infinite alternate;
    }

    @keyframes move{
      from{transform:translate(0,0);}
      to{transform:translate(80px,80px);}
    }

    @keyframes move2{
      from{transform:translate(0,0);}
      to{transform:translate(-80px,-50px);}
    }

    .calculator{
      position:relative;
      z-index:1;
      width:350px;
      padding:25px;
      border-radius:30px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.2);
      box-shadow:0 15px 35px rgba(0,0,0,0.4);
    }

    .title{
      color:white;
      text-align:center;
      margin-bottom:20px;
      font-size:1.8rem;
      font-weight:600;
      letter-spacing:1px;
    }

    .display{
      width:100%;
      height:80px;
      border:none;
      outline:none;
      border-radius:20px;
      padding:20px;
      font-size:2rem;
      text-align:right;
      margin-bottom:20px;
      background:rgba(255,255,255,0.1);
      color:#fff;
      box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:15px;
    }

    button{
      height:65px;
      border:none;
      border-radius:18px;
      font-size:1.3rem;
      cursor:pointer;
      transition:0.2s;
      color:white;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
      box-shadow:
      0 4px 10px rgba(0,0,0,0.2),
      inset 0 0 5px rgba(255,255,255,0.08);
    }

    button:hover{
      transform:translateY(-3px) scale(1.03);
      background:rgba(255,255,255,0.15);
    }

    button:active{
      transform:scale(0.95);
    }

    .operator{
      background:linear-gradient(135deg,#7c3aed,#06b6d4);
    }

    .equal{
      grid-column:span 2;
      background:linear-gradient(135deg,#ff512f,#dd2476);
    }

    .clear{
      background:linear-gradient(135deg,#ef4444,#dc2626);
    }

    .delete{
      background:linear-gradient(135deg,#f59e0b,#d97706);
    }

    @media(max-width:400px){
      .calculator{
        width:95%;
      }
    }

  </style>
</head>

<body>

  <div class="calculator">
    <h1 class="title">Calculator</h1>

    <input type="text" class="display" id="display" readonly>

    <div class="buttons">

      <button class="clear" onclick="clearDisplay()">AC</button>
      <button class="delete" onclick="deleteLast()">DEL</button>
      <button class="operator" onclick="appendValue('%')">%</button>
      <button class="operator" onclick="appendValue('/')">÷</button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('*')">×</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button onclick="appendValue('0')">0</button>
      <button onclick="appendValue('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>

    </div>
  </div>

  <script>

    const display = document.getElementById("display");

    function appendValue(value){
      display.value += value;
    }

    function clearDisplay(){
      display.value = "";
    }

    function deleteLast(){
      display.value = display.value.slice(0,-1);
    }

    function calculate(){
      try{
        display.value = eval(display.value);
      }
      catch{
        display.value = "Error";
      }
    }

    // Keyboard Support
    document.addEventListener("keydown",(e)=>{

      const allowedKeys =
      "0123456789+-*/.%";

      if(allowedKeys.includes(e.key)){
        appendValue(e.key);
      }

      else if(e.key === "Enter"){
        calculate();
      }

      else if(e.key === "Backspace"){
        deleteLast();
      }

      else if(e.key === "Escape"){
        clearDisplay();
      }

    });

  </script>

</body>
</html>
